<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>بوابة القرماني | Alqurmanix Gateway</title>
    <style>
        :root { --primary: #38bdf8; --bg: #0f172a; --card: #1e293b; --text: #f8fafc; --muted: #94a3b8; }
        body { background-color: var(--bg); color: var(--text); font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; align-items: center; justify-content: center; min-height: 100vh; margin: 0; }
        
        .auth-container { background: var(--card); width: 100%; max-width: 400px; padding: 30px; border-radius: 24px; box-shadow: 0 20px 50px rgba(0,0,0,0.5); border: 1px solid #334155; text-align: center; }
        
        .logo { font-size: 2rem; font-weight: 900; color: var(--primary); letter-spacing: 3px; margin-bottom: 10px; }
        .system-badge { font-size: 0.7rem; background: #0369a1; padding: 4px 12px; border-radius: 50px; display: inline-block; margin-bottom: 30px; opacity: 0.8; }

        /* نظام التبويبات (Tabs) */
        .tabs { display: flex; background: #0f172a; padding: 5px; border-radius: 12px; margin-bottom: 25px; }
        .tab-btn { flex: 1; padding: 10px; border: none; background: transparent; color: var(--muted); cursor: pointer; font-weight: bold; border-radius: 8px; transition: 0.3s; }
        .tab-btn.active { background: var(--primary); color: #000; }

        /* النماذج (Forms) */
        .auth-form { display: none; flex-direction: column; gap: 15px; }
        .auth-form.active { display: flex; }
        
        input { background: #0f172a; border: 1px solid #334155; padding: 12px; border-radius: 10px; color: #fff; text-align: right; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--primary); box-shadow: 0 0 10px rgba(56, 189, 248, 0.2); }
        
        .submit-btn { background: var(--primary); color: #0f172a; border: none; padding: 14px; border-radius: 10px; font-weight: bold; cursor: pointer; margin-top: 10px; transition: 0.3s; }
        .submit-btn:hover { transform: translateY(-2px); opacity: 0.9; }

        .footer-note { margin-top: 20px; font-size: 0.75rem; color: var(--muted); line-height: 1.5; }
    </style>
</head>
<body>

    <div class="auth-container">
        <div class="logo">ALQURMANIX</div>
        <div class="system-badge">نظام الهوية الصارم - الإصدار 2.0</div>

        <div class="tabs">
            <button class="tab-btn active" onclick="showForm('login')">تسجيل دخول</button>
            <button class="tab-btn" onclick="showForm('signup')">اشتراك جديد</button>
        </div>

        <form id="loginForm" class="auth-form active">
            <input type="email" placeholder="البريد الإلكتروني" required>
            <input type="password" placeholder="كلمة السر" required>
            <button type="submit" class="submit-btn">دخول آمن</button>
        </form>

        <form id="signupForm" class="auth-form">
            <input type="email" placeholder="البريد الإلكتروني" required>
            <input type="password" placeholder="كلمة السر" required>
            <input type="password" placeholder="تأكيد كلمة السر" required>
            <button type="submit" class="submit-btn">إنشاء حساب</button>
        </form>

        <div class="footer-note">
            جميع القواعد بدائية وصارمة.<br>
            بموجب الكود، لا استثناء ولا تراجع.
        </div>
    </div>

    <script>
        function showForm(type) {
            // إزالة الحالة النشطة من الأزرار
            document.querySelectorAll('.tab-btn').forEach(btn => btn.classList.remove('active'));
            // إخفاء جميع النماذج
            document.querySelectorAll('.auth-form').forEach(form => form.classList.remove('active'));

            if (type === 'login') {
                document.getElementById('loginForm').classList.add('active');
                document.querySelectorAll('.tab-btn')[0].classList.add('active');
            } else {
                document.getElementById('signupForm').classList.add('active');
                document.querySelectorAll('.tab-btn')[1].classList.add('active');
            }
        }
    </script>

</body>
  </html>
