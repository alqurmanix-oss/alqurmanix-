<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ALQURMANI X</title>

<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;700;900&display=swap" rel="stylesheet">

<style>
:root{
  --gold1:#d4af37;
  --gold2:#ffd700;
  --gold3:#c9a227;
  --gold4:#e6c200;
  --gold5:#b8960a;
  --gold6:#f5d76e;
  --gold7:#a67c00;
}

body{
  margin:0;
  font-family:'Cairo';
  background:#000;
  color:#fff;
}

/* ===== LOGO ===== */
.logo{
  text-align:center;
  font-size:36px;
  font-weight:900;
  margin-top:30px;
  animation:goldFlow 5s infinite linear;
}

@keyframes goldFlow{
  0%{color:var(--gold1)}
  25%{color:var(--gold2)}
  50%{color:var(--gold3)}
  75%{color:var(--gold4)}
  100%{color:var(--gold5)}
}

/* ===== LANGUAGE MENU ===== */
.lang-box{
  position:absolute;
  top:15px;
  left:15px;
}

.lang-btn{
  cursor:pointer;
  font-size:18px;
}

.lang-menu{
  display:none;
  position:absolute;
  top:30px;
  background:#111;
  border-radius:10px;
  box-shadow:0 0 20px gold;
}

.lang-menu div{
  padding:10px;
  cursor:pointer;
}

.lang-menu div:hover{
  background:gold;
  color:#000;
}

/* ===== CONTAINER ===== */
.container{
  width:95%;
  max-width:420px;
  margin:40px auto;
  background:#111;
  padding:25px;
  border-radius:20px;
  box-shadow:0 0 40px rgba(255,215,0,0.3);
}

.tabs{
  display:flex;
}

.tabs button{
  flex:1;
  padding:12px;
  border:none;
  background:#222;
  color:#fff;
  cursor:pointer;
}

.tabs .active{
  background:linear-gradient(90deg,var(--gold1),var(--gold2));
  color:#000;
}

.form{display:none}
.form.active{display:block}

input{
  width:100%;
  padding:12px;
  margin:10px 0;
  border:none;
  border-radius:10px;
}

.error{color:red;font-size:12px}

.submit{
  width:100%;
  padding:12px;
  background:linear-gradient(90deg,var(--gold1),var(--gold2));
  border:none;
  border-radius:10px;
  font-weight:bold;
  cursor:pointer;
}

/* ===== PASSWORD ===== */
.strength{
  height:6px;
  background:#333;
  border-radius:10px;
}
.strength div{
  height:100%;
  width:0%;
  background:lime;
}

.rules span{display:block;font-size:12px;color:#888}
.rules .ok{color:lime}

/* ===== POPUP ===== */
.popup{
  position:fixed;
  top:0;left:0;
  width:100%;height:100%;
  background:rgba(0,0,0,0.85);
  display:none;
  justify-content:center;
  align-items:center;
}

.popup-box{
  background:#111;
  padding:30px;
  border-radius:20px;
  box-shadow:0 0 50px gold;
  max-width:400px;
  text-align:center;
}

.close{cursor:pointer;color:red;float:left}

</style>
</head>

<body>

<div class="lang-box">
  <div class="lang-btn" onclick="toggleLangMenu()">🌍</div>
  <div id="langMenu" class="lang-menu">
    <div onclick="goLang('index-en.html')">English</div>
    <div onclick="goLang('index-es.html')">Español</div>
    <div onclick="goLang('index-fr.html')">Français</div>
  </div>
</div>

<div class="logo">ALQURMANI X</div>

<div class="container">

<div class="tabs">
<button class="active" onclick="switchTab('login',this)">دخول</button>
<button onclick="switchTab('signup',this)">اشتراك</button>
</div>

<div id="login" class="form active">
<input id="lEmail" type="email" placeholder="البريد">
<input id="lPass" type="password" placeholder="كلمة السر">
<button class="submit" onclick="login()">دخول</button>
<p onclick="resetPass()" style="cursor:pointer;color:gold">نسيت كلمة السر؟</p>
</div>

<div id="signup" class="form">
<input id="sEmail" type="email" placeholder="البريد">
<input id="sPass" type="password" placeholder="كلمة السر" oninput="checkPass()">
<input id="sPass2" type="password" placeholder="تأكيد كلمة السر">

<div class="strength"><div id="bar"></div></div>

<div class="rules">
<span id="r1">6+ حروف</span>
<span id="r2">حرف كبير</span>
<span id="r3">رقم</span>
<span id="r4">رمز</span>
</div>

<label><input type="checkbox" id="terms"> موافق على الشروط</label>
<button class="submit" onclick="signup()">اشتراك</button>
</div>

</div>

<div id="popup" class="popup">
<div class="popup-box">
<span class="close" onclick="closePop()">✖</span>
<p id="msg"></p>
</div>
</div>

<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, sendPasswordResetEmail, sendEmailVerification } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const app=initializeApp({
apiKey:"AIzaSyDA0gnR9U3I90umdJsAJI4h93nEPD3BJ9w",
authDomain:"alqurmanix-aswan.firebaseapp.com",
projectId:"alqurmanix-aswan"
});

const auth=getAuth(app);
const db=getFirestore(app);

window.switchTab=(id,el)=>{
 document.querySelectorAll('.form').forEach(f=>f.classList.remove('active'));
 document.getElementById(id).classList.add('active');
 document.querySelectorAll('.tabs button').forEach(b=>b.classList.remove('active'));
 el.classList.add('active');
}

window.toggleLangMenu=()=>{
 let m=document.getElementById('langMenu');
 m.style.display=m.style.display=='block'?'none':'block';
}

window.goLang=(file)=>window.location.href=file;

function pop(t){
 document.getElementById('msg').innerText=t;
 document.getElementById('popup').style.display='flex';
}
window.closePop=()=>document.getElementById('popup').style.display='none';

window.checkPass=()=>{
 let v=sPass.value;
 let score=0;
 if(v.length>=6){r1.classList.add('ok');score+=25}else r1.classList.remove('ok');
 if(/[A-Z]/.test(v)){r2.classList.add('ok');score+=25}else r2.classList.remove('ok');
 if(/[0-9]/.test(v)){r3.classList.add('ok');score+=25}else r3.classList.remove('ok');
 if(/[^A-Za-z0-9]/.test(v)){r4.classList.add('ok');score+=25}else r4.classList.remove('ok');
 bar.style.width=score+'%';
}

window.signup=async()=>{
 if(sPass.value!==sPass2.value) return pop("كلمتا السر غير متطابقتين");
 if(!terms.checked) return pop("وافق على الشروط أولاً");
 try{
 let u=await createUserWithEmailAndPassword(auth,sEmail.value,sPass.value);
 await sendEmailVerification(u.user);
 await setDoc(doc(db,'users',u.user.uid),{
 email:sEmail.value,
 status:'pending',
 createdAt:new Date(),
 lockUntil:null
 });
 pop("تم التسجيل بنجاح — تحقق من بريدك لتفعيل الحساب");
 setTimeout(()=>switchTab('login',document.querySelectorAll('.tabs button')[0]),4000);
 }catch(e){pop(e.message)}
}

window.login=async()=>{
 try{
 let u=await signInWithEmailAndPassword(auth,lEmail.value,lPass.value);
 if(!u.user.emailVerified) return pop("يجب تفعيل البريد الإلكتروني");
 let d=await getDoc(doc(db,'users',u.user.uid));
 if(!d.exists()) return pop("الحساب غير موجود");
 let data=d.data();
 if(data.status!='active') return pop("الحساب غير مفعل أو موقوف");
 window.location.href='PortalHub.html';
 }catch(e){pop("فشل تسجيل الدخول")}
}

window.resetPass=async()=>{
 let e=prompt("ادخل بريدك");
 if(!e) return;
 await sendPasswordResetEmail(auth,e);
 pop("تم إرسال رابط إعادة التعيين");
}
</script>

</body>
</html>
