<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import {
  getAuth,
  createUserWithEmailAndPassword,
  signInWithEmailAndPassword,
  sendEmailVerification,
  sendPasswordResetEmail,
  signOut,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

import {
  getFirestore,
  doc,
  setDoc,
  getDoc,
  updateDoc,
  serverTimestamp,
  deleteDoc
} from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

/* ================= CONFIG ================= */
const firebaseConfig = {
  apiKey: "AIzaSyDA0gnR9U3I90umdJsAJI4h93nEPD3BJ9w",
  authDomain: "alqurmanix-aswan.firebaseapp.com",
  projectId: "alqurmanix-aswan",
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

/* ================= GLOBAL GUARD ================= */
let busy = false;
function lockUI(btn) {
  if (busy) return false;
  busy = true;
  if (btn) btn.disabled = true;
  setTimeout(()=>{ busy=false; if(btn) btn.disabled=false; },3000);
  return true;
}

/* ================= FINGERPRINT ================= */
function getFP() {
  return btoa(navigator.userAgent + screen.width + screen.height + Date.now());
}

/* ================= LOG ================= */
async function log(type, uid) {
  try {
    await setDoc(doc(db, "auth_logs", crypto.randomUUID()), {
      uid,
      type,
      timestamp: serverTimestamp()
    });
  } catch {}
}

/* ================= SESSION ================= */
async function createSession(user) {
  await setDoc(doc(db, "sessions", user.uid), {
    createdAt: serverTimestamp(),
    expiresAt: new Date(Date.now() + 86400000)
  });
}

async function deleteSession(user) {
  await deleteDoc(doc(db, "sessions", user.uid));
}

/* ================= SIGNUP ================= */
window.handleSignup = async (e) => {
  e.preventDefault();
  if (!lockUI(e.submitter)) return;

  const email = signupEmail.value.trim();
  const pass = signupPassword.value;
  const conf = signupConfirm.value;

  if (pass !== conf)
    return showModal("خطأ", "كلمة المرور غير متطابقة", "fas fa-times", "#ff4444");

  if (!/^(?=.*\d)(?=.*[!@#$%^&*]).{8,}$/.test(pass))
    return showModal("ضعيف", "كلمة مرور غير قوية", "fas fa-shield", "#ff4444");

  try {
    const cred = await createUserWithEmailAndPassword(auth, email, pass);
    const user = cred.user;

    await setDoc(doc(db, "users", user.uid), {
      email: user.email,
      status: "pending",
      createdAt: serverTimestamp(),
      lockUntil: null
    });

    await setDoc(doc(db, "security", user.uid), {
      twoFA: false,
      lastPasswordChange: serverTimestamp()
    });

    await sendEmailVerification(user);
    await log("signup", user.uid);

    await signOut(auth);

    showModal("تم", "راجع بريدك لتفعيل الحساب", "fas fa-envelope", "#00ff66");

    signupForm.reset();
    switchTab("login");

  } catch (err) {
    showModal("خطأ", "فشل إنشاء الحساب", "fas fa-times", "#ff4444");
  }
};

/* ================= LOGIN ================= */
window.handleLogin = async (e) => {
  e.preventDefault();
  if (!lockUI(e.submitter)) return;

  const email = loginEmail.value.trim();
  const pass = loginPassword.value;

  try {
    const cred = await signInWithEmailAndPassword(auth, email, pass);
    const user = cred.user;

    if (!user.emailVerified) {
      await signOut(auth);
      return showModal("تنبيه", "فعل بريدك أولاً", "fas fa-lock", "#ffaa00");
    }

    const userRef = doc(db, "users", user.uid);
    const snap = await getDoc(userRef);

    if (!snap.exists()) throw "no_user";

    const data = snap.data();

    const banned = await getDoc(doc(db, "blacklist", user.uid));
    if (banned.exists()) {
      await signOut(auth);
      return showModal("محظور", "تم حظر الحساب", "fas fa-ban", "#ff0000");
    }

    if (data.lockUntil && Date.now() < data.lockUntil.toMillis()) {
      await signOut(auth);
      return showModal("مقفل", "الحساب مقفل مؤقتاً", "fas fa-lock", "#ffaa00");
    }

    if (data.status === "pending") {
      await updateDoc(userRef, { status: "active" });
    }

    await createSession(user);
    await log("login", user.uid);

    showModal("نجاح", "جارى الدخول...", "fas fa-crown", "#FFD700");

    setTimeout(() => location.href = "index.html", 2000);

  } catch {
    showModal("فشل", "بيانات غير صحيحة", "fas fa-times", "#ff4444");
  }
};

/* ================= RESET ================= */
window.showResetModal = async () => {
  const email = loginEmail.value.trim();
  if (!email)
    return showModal("تنبيه", "اكتب بريدك أولاً", "fas fa-info", "#ffaa00");

  try {
    await sendPasswordResetEmail(auth, email);

    await setDoc(doc(db, "password_resets", crypto.randomUUID()), {
      uid: "unknown",
      createdAt: serverTimestamp()
    });

    showModal("تم", "تم إرسال الرابط", "fas fa-paper-plane", "#00ff66");

  } catch {
    showModal("خطأ", "فشل الإرسال", "fas fa-times", "#ff4444");
  }
};

/* ================= RESEND ================= */
window.resendVerification = async () => {
  const email = loginEmail.value;
  const pass = loginPassword.value;

  if (!email || !pass)
    return showModal("تنبيه", "اكتب البيانات أولاً", "fas fa-info", "#ffaa00");

  try {
    const cred = await signInWithEmailAndPassword(auth, email, pass);
    const user = cred.user;

    if (user.emailVerified) {
      showModal("تم", "الحساب مفعل", "fas fa-check", "#00ff66");
    } else {
      await sendEmailVerification(user);
      showModal("تم", "أُرسل مجدداً", "fas fa-paper-plane", "#FFD700");
    }

    await signOut(auth);

  } catch {
    showModal("خطأ", "فشل العملية", "fas fa-times", "#ff4444");
  }
};

/* ================= LOGOUT ================= */
window.logout = async () => {
  const user = auth.currentUser;
  if (user) {
    await deleteSession(user);
    await log("logout", user.uid);
  }
  await signOut(auth);
  location.href = "login.html";
};

/* ================= SESSION GUARD ================= */
onAuthStateChanged(auth, async (user) => {
  if (!user) return;

  const session = await getDoc(doc(db, "sessions", user.uid));

  if (!session.exists()) {
    await signOut(auth);
    location.href = "login.html";
  }
});

/* ================= ANTI-HACK ================= */
let clicks = 0;
window.addEventListener("click", () => {
  clicks++;
  if (clicks > 60) autoBan();
});

async function autoBan() {
  const user = auth.currentUser;
  if (!user) return;

  await setDoc(doc(db, "blacklist", user.uid), {
    reason: "abuse"
  });

  await signOut(auth);

  showModal("تم حظرك", "نشاط مشبوه", "fas fa-ban", "#ff0000");
}
</script>
