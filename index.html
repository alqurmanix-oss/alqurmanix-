<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ALQURMANIX | بوابة الهوية الرسمية</title>
    <link rel="icon" type="image/png" href="favicon.png">
    
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
        import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, sendEmailVerification, sendPasswordResetEmail } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, updateDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyDA0gnR9U3I90umdJsAJI4h93nEPD3BJ9w",
            authDomain: "alqurmanix-aswan.firebaseapp.com",
            projectId: "alqurmanix-aswan",
            storageBucket: "alqurmanix-aswan.firebasestorage.app",
            messagingSenderId: "882189888648",
            appId: "1:882189888648:web:41d3f89c74ad76fd6a833d",
            measurementId: "G-5SZY72ESEV"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        window.auth = auth; window.db = db;
    </script>

    <style>
        :root {
            --gold-1: #FFD700; --gold-2: #FDB931; --gold-3: #EAA315; --gold-4: #D4AF37;
            --gold-5: #C5A028; --gold-6: #B8860B; --gold-7: #996515; --gold-8: #855E42;
            --bg: #05070a; --card-bg: rgba(15, 23, 42, 0.8); --neon-glow: 0 0 15px var(--gold-4);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { background: var(--bg); color: #fff; font-family: 'Segoe UI', Roboto, sans-serif; overflow-x: hidden; min-height: 100vh; display: flex; align-items: center; justify-content: center; }

        /* خلفية سينمائية */
        body::before { content: ''; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: radial-gradient(circle at center, #1e293b 0%, #05070a 100%); z-index: -1; }

        /* محول اللغات الفخم */
        .lang-switcher { position: fixed; top: 20px; right: 20px; z-index: 1000; cursor: pointer; display: flex; align-items: center; gap: 10px; background: rgba(255,255,255,0.05); padding: 10px 20px; border-radius: 50px; border: 1px solid var(--gold-6); transition: 0.3s; }
        .lang-switcher:hover { background: rgba(255,255,255,0.1); box-shadow: var(--neon-glow); }
        .globe { width: 25px; height: 25px; animation: rotation 10s linear infinite; }
        @keyframes rotation { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }

        .lang-menu { position: absolute; top: 60px; right: 0; background: var(--card-bg); border: 1px solid var(--gold-4); border-radius: 15px; display: none; overflow: hidden; width: 180px; backdrop-filter: blur(15px); }
        .lang-menu a { display: block; padding: 12px 20px; color: #fff; text-decoration: none; font-size: 0.9rem; transition: 0.3s; text-align: right; }
        .lang-menu a:hover { background: var(--gold-4); color: #000; }

        /* لوجو النيون الذهبي المتغير */
        .logo-neon { font-size: 3rem; font-weight: 900; letter-spacing: 5px; margin-bottom: 30px; text-transform: uppercase; animation: neon-gold-shift 8s infinite alternate; }
        @keyframes neon-gold-shift {
            0% { color: var(--gold-1); text-shadow: 0 0 10px var(--gold-1); }
            14% { color: var(--gold-2); text-shadow: 0 0 15px var(--gold-2); }
            28% { color: var(--gold-3); text-shadow: 0 0 20px var(--gold-3); }
            42% { color: var(--gold-4); text-shadow: 0 0 25px var(--gold-4); }
            57% { color: var(--gold-5); text-shadow: 0 0 20px var(--gold-5); }
            71% { color: var(--gold-6); text-shadow: 0 0 15px var(--gold-6); }
            85% { color: var(--gold-7); text-shadow: 0 0 10px var(--gold-7); }
            100% { color: var(--gold-8); text-shadow: 0 0 5px var(--gold-8); }
        }

        /* الحاوية الرئيسية */
        .main-card { background: var(--card-bg); backdrop-filter: blur(20px); border: 1px solid rgba(255,215,0,0.2); border-radius: 30px; width: 90%; max-width: 450px; padding: 40px; box-shadow: 0 25px 50px rgba(0,0,0,0.8); position: relative; }

        .tabs-header { display: flex; margin-bottom: 30px; background: rgba(0,0,0,0.3); border-radius: 15px; padding: 5px; }
        .tab-trigger { flex: 1; padding: 15px; border: none; background: none; color: #94a3b8; cursor: pointer; font-weight: bold; border-radius: 12px; transition: 0.4s; }
        .tab-trigger.active { background: var(--gold-4); color: #000; box-shadow: var(--neon-glow); }

        .form-content { display: none; flex-direction: column; gap: 20px; }
        .form-content.active { display: flex; }

        .input-group { position: relative; display: flex; flex-direction: column; gap: 8px; }
        input { background: rgba(0,0,0,0.5); border: 1px solid #334155; padding: 15px; border-radius: 12px; color: #fff; font-size: 1rem; outline: none; transition: 0.3s; text-align: right; }
        input:focus { border-color: var(--gold-4); box-shadow: 0 0 10px rgba(212, 175, 55, 0.3); }

        /* شريط قوة كلمة السر */
        .strength-meter { height: 4px; background: #334155; border-radius: 2px; margin-top: -10px; overflow: hidden; display: flex; }
        .strength-bar { height: 100%; width: 0; transition: 0.5s; }

        .btn-prime { background: linear-gradient(45deg, var(--gold-6), var(--gold-4)); color: #000; border: none; padding: 18px; border-radius: 12px; font-weight: 900; cursor: pointer; transition: 0.4s; font-size: 1.1rem; }
        .btn-prime:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(212, 175, 55, 0.4); }

        /* النوافذ المنبثقة الفخمة (Modal) */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); backdrop-filter: blur(10px); display: none; align-items: center; justify-content: center; z-index: 2000; }
        .modal-box { background: linear-gradient(135deg, #1e293b, #0f172a); border: 2px solid var(--gold-4); padding: 40px; border-radius: 25px; max-width: 500px; width: 90%; text-align: center; position: relative; animation: modalIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275); }
        @keyframes modalIn { from { transform: scale(0.8); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        .modal-close { position: absolute; top: 15px; left: 15px; color: var(--gold-4); font-size: 1.5rem; cursor: pointer; }
    </style>
</head>
<body>

    <div class="lang-switcher" onclick="toggleLangMenu()">
        <img src="https://cdn-icons-png.flaticon.com/512/814/814513.png" class="globe" alt="Globe">
        <span>العربية</span>
        <div class="lang-menu" id="langMenu">
            <a href="index-en.html">English (الإنجليزية)</a>
            <a href="index-es.html">Español (الإسبانية)</a>
            <a href="index-fr.html">Français (الفرنسية)</a>
        </div>
    </div>

    <div class="main-card">
        <div class="logo-neon">ALQURMANIX</div>
        
        <div class="tabs-header">
            <button class="tab-trigger active" onclick="switchTab('login')">تسجيل دخول</button>
            <button class="tab-trigger" onclick="switchTab('signup')">اشتراك جديد</button>
        </div>

        <div id="loginForm" class="form-content active">
            <div class="input-group">
                <input type="email" id="logEmail" placeholder="البريد الإلكتروني الموثق">
            </div>
            <div class="input-group">
                <input type="password" id="logPass" placeholder="كلمة المرور">
            </div>
            <button class="btn-prime" onclick="handleLogin()">دخول آمن</button>
            <p style="font-size: 0.8rem; color: var(--gold-4); cursor: pointer; margin-top: 10px;" onclick="showResetModal()">نسيت كلمة المرور؟</p>
        </div>

        <div id="signupForm" class="form-content">
            <div class="input-group">
                <input type="email" id="regEmail" placeholder="البريد الإلكتروني">
            </div>
            <div class="input-group">
                <input type="password" id="regPass" placeholder="كلمة المرور" oninput="checkStrength(this.value)">
                <div class="strength-meter"><div id="strengthBar" class="strength-bar"></div></div>
            </div>
            <div style="display: flex; align-items: center; gap: 10px; font-size: 0.8rem; color: #94a3b8;">
                <input type="checkbox" id="termsCheck">
                <span onclick="showTerms()" style="cursor: pointer; text-decoration: underline;">أوافق على اتفاقية المستخدم الصارمة</span>
            </div>
            <button class="btn-prime" onclick="handleSignup()">إنشاء الهوية الرقمية</button>
        </div>
    </div>

    <div class="modal-overlay" id="modalOverlay">
        <div class="modal-box">
            <div class="modal-close" onclick="closeModal()">✕</div>
            <h2 id="modalTitle" style="color: var(--gold-4); margin-bottom: 20px;"></h2>
            <div id="modalBody" style="line-height: 1.6; color: #cbd5e1; margin-bottom: 30px;"></div>
            <div id="modalFooter"></div>
        </div>
    </div>

    <script>
        function toggleLangMenu() {
            const menu = document.getElementById('langMenu');
            menu.style.display = menu.style.display === 'block' ? 'none' : 'block';
        }

        function switchTab(type) {
            document.querySelectorAll('.tab-trigger').forEach(b => b.classList.remove('active'));
            document.querySelectorAll('.form-content').forEach(f => f.classList.remove('active'));
            if(type === 'login') {
                document.querySelector('[onclick="switchTab(\'login\')"]').classList.add('active');
                document.getElementById('loginForm').classList.add('active');
            } else {
                document.querySelector('[onclick="switchTab(\'signup\')"]').classList.add('active');
                document.getElementById('signupForm').classList.add('active');
            }
        }

        function showModal(title, body, footer = '') {
            document.getElementById('modalTitle').innerText = title;
            document.getElementById('modalBody').innerHTML = body;
            document.getElementById('modalFooter').innerHTML = footer;
            document.getElementById('modalOverlay').style.display = 'flex';
        }

        function closeModal() { document.getElementById('modalOverlay').style.display = 'none'; }

        function checkStrength(p) {
            let s = 0; if(p.length > 8) s++; if(/[A-Z]/.test(p)) s++; if(/[0-9]/.test(p)) s++; if(/[^A-Za-z0-9]/.test(p)) s++;
            const bar = document.getElementById('strengthBar');
            const colors = ['#ff4444', '#ffbb33', '#00C851', '#007E33'];
            bar.style.width = (s*25) + '%';
            bar.style.background = colors[s-1] || '#334155';
        }

        async function handleSignup() {
            const email = document.getElementById('regEmail').value;
            const pass = document.getElementById('regPass').value;
            if(!document.getElementById('termsCheck').checked) return showModal('تنبيه', 'يجب الموافقة على الشروط الصارمة للمنصة');

            try {
                const userCred = await createUserWithEmailAndPassword(window.auth, email, pass);
                await sendEmailVerification(userCred.user);
                
                // إنشاء ملف المستخدم في Firestore (الوضع المعلق)
                await setDoc(doc(window.db, "users", userCred.user.uid), {
                    email: email,
                    status: 'pending',
                    createdAt: new Date(),
                    lockUntil: null
                });

                showModal('نجاح العملية', 'مرحباً بك في نظام القرماني. تم إنشاء هويتك بنجاح. يرجى تفعيل حسابك عبر الرابط المرسل لبريدك الإلكتروني الآن.');
                setTimeout(() => { window.location.reload(); }, 5000);
            } catch (error) {
                showModal('خطأ في التسجيل', error.message);
            }
        }

        async function handleLogin() {
            const email = document.getElementById('logEmail').value;
            const pass = document.getElementById('logPass').value;

            try {
                const userCred = await signInWithEmailAndPassword(window.auth, email, pass);
                const userDoc = await getDoc(doc(window.db, "users", userCred.user.uid));
                const data = userDoc.data();

                if(!userCred.user.emailVerified) return showModal('تنبيه الأمان', 'الحساب غير نشط. يرجى تفعيل البريد الإلكتروني أولاً.');
                if(data.status !== 'active' && data.status !== 'pending') return showModal('وصول مرفوض', `حسابك في حالة: ${data.status}. تواصل مع الدعم الفني.`, `<button class="btn-prime" onclick="location.href='AuthSupport.html'">الدعم الفني</button>`);
                
                // تحديث الحالة لـ Active عند أول دخول بعد التفعيل
                if(data.status === 'pending') await updateDoc(doc(window.db, "users", userCred.user.uid), { status: 'active' });

                location.href = 'PortalHub.html';
            } catch (error) {
                showModal('فشل الدخول', 'بيانات الاعتماد غير مطابقة للقيود الصارمة للنظام.');
            }
        }

        function showTerms() {
            showModal('اتفاقية المستخدم', '1. النظام صارم ولا يقبل التلاعب. <br> 2. الحظر نهائي لأي محاولة اختراق. <br> 3. العملة مربوطة بأصول حقيقية. <br> 4. يمنع تعدد الحسابات. <br> 5. البيانات مشفرة للأبد.');
        }

        async function showResetModal() {
            const email = prompt("أدخل بريدك الإلكتروني لإرسال رابط الاستعادة:");
            if(email) {
                await sendPasswordResetEmail(window.auth, email);
                showModal('إعادة تعيين', 'تم إرسال رابط الأمان لبريدك الإلكتروني.');
            }
        }
    </script>
</body>
</html>
