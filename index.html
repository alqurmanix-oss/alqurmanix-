<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ALQURMANI X - Auth</title>

<!-- Google Font -->
<link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;800&display=swap" rel="stylesheet">

<style>
:root{
  --gold1:#d4af37;
  --gold2:#ffd700;
  --gold3:#c9a227;
  --gold4:#e6c200;
  --gold5:#b8960a;
  --gold6:#f5d76e;
  --gold7:#a67c00;
  --bg:#000;
}

*{box-sizing:border-box;font-family:'Cairo',sans-serif}
body{
  margin:0;
  background:#000;
  color:#fff;
  overflow-x:hidden;
}

/* LOGO */
.logo{
  text-align:center;
  font-size:32px;
  font-weight:800;
  letter-spacing:3px;
  margin-top:30px;
  animation:goldShift 6s infinite alternate;
}

@keyframes goldShift{
  0%{color:var(--gold1)}
  20%{color:var(--gold2)}
  40%{color:var(--gold3)}
  60%{color:var(--gold4)}
  80%{color:var(--gold5)}
  100%{color:var(--gold6)}
}

.container{
  width:90%;
  max-width:420px;
  margin:40px auto;
  background:#111;
  border-radius:20px;
  padding:20px;
  box-shadow:0 0 30px rgba(255,215,0,0.2);
}

.tabs{
  display:flex;
}
.tabs button{
  flex:1;
  padding:12px;
  background:#222;
  border:none;
  color:#fff;
  cursor:pointer;
}
.tabs button.active{
  background:linear-gradient(90deg,var(--gold1),var(--gold2));
  color:#000;
}

.form{
  display:none;
  margin-top:20px;
}
.form.active{display:block}

input{
  width:100%;
  padding:12px;
  margin:10px 0;
  border:none;
  border-radius:10px;
}

button.submit{
  width:100%;
  padding:12px;
  background:linear-gradient(90deg,var(--gold1),var(--gold2));
  border:none;
  border-radius:10px;
  font-weight:bold;
  cursor:pointer;
}

.password-strength{
  height:6px;
  background:#333;
  border-radius:10px;
  margin-top:-5px;
}
.password-strength div{
  height:100%;
  width:0%;
  background:lime;
  border-radius:10px;
}

.popup{
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:rgba(0,0,0,0.8);
  display:none;
  justify-content:center;
  align-items:center;
}

.popup-content{
  background:#111;
  padding:30px;
  border-radius:20px;
  max-width:400px;
  text-align:center;
  box-shadow:0 0 40px gold;
}

.close{
  float:left;
  cursor:pointer;
  color:red;
}

.lang-switch{
  position:absolute;
  top:10px;
  left:10px;
  cursor:pointer;
}

</style>
</head>

<body>

<div class="lang-switch" onclick="toggleLang()">🌍 AR</div>

<div class="logo">ALQURMANI X</div>

<div class="container">

<div class="tabs">
  <button class="active" onclick="switchTab('login')">تسجيل الدخول</button>
  <button onclick="switchTab('signup')">اشتراك</button>
</div>

<!-- LOGIN -->
<div id="login" class="form active">
  <input type="email" id="loginEmail" placeholder="البريد الإلكتروني">
  <input type="password" id="loginPass" placeholder="كلمة المرور">
  <button class="submit" onclick="login()">دخول</button>
  <p onclick="resetPass()" style="cursor:pointer;color:gold">نسيت كلمة السر؟</p>
</div>

<!-- SIGNUP -->
<div id="signup" class="form">
  <input type="email" id="signEmail" placeholder="البريد الإلكتروني">
  <input type="password" id="signPass" placeholder="كلمة المرور" oninput="checkStrength()">
  <div class="password-strength"><div id="strengthBar"></div></div>
  <label><input type="checkbox" id="terms"> موافق على الشروط</label>
  <button class="submit" onclick="signup()">اشتراك</button>
</div>

</div>

<div id="popup" class="popup">
  <div class="popup-content">
    <span class="close" onclick="closePopup()">✖</span>
    <p id="popupText"></p>
  </div>
</div>

<script type="module">

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
import { getAuth, createUserWithEmailAndPassword, signInWithEmailAndPassword, sendPasswordResetEmail, sendEmailVerification } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
import { getFirestore, doc, setDoc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyDA0gnR9U3I90umdJsAJI4h93nEPD3BJ9w",
  authDomain: "alqurmanix-aswan.firebaseapp.com",
  projectId: "alqurmanix-aswan",
  storageBucket: "alqurmanix-aswan.firebasestorage.app",
  messagingSenderId: "882189888648",
  appId: "1:882189888648:web:41d3f89c74ad76fd6a833d",
  measurementId: "G-5SZY72ESEV"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

window.switchTab = (tab)=>{
  document.querySelectorAll('.form').forEach(f=>f.classList.remove('active'));
  document.getElementById(tab).classList.add('active');
}

window.checkStrength = ()=>{
  let val=document.getElementById('signPass').value;
  let strength=0;
  if(val.length>6) strength+=30;
  if(/[A-Z]/.test(val)) strength+=30;
  if(/[0-9]/.test(val)) strength+=20;
  if(/[^A-Za-z0-9]/.test(val)) strength+=20;
  document.getElementById('strengthBar').style.width=strength+'%';
}

function popup(msg){
  document.getElementById('popupText').innerText=msg;
  document.getElementById('popup').style.display='flex';
}
window.closePopup=()=> document.getElementById('popup').style.display='none';

window.signup = async ()=>{
  let email=signEmail.value;
  let pass=signPass.value;
  if(!terms.checked) return popup("يجب الموافقة على الشروط");

  try{
    let user=await createUserWithEmailAndPassword(auth,email,pass);
    await sendEmailVerification(user.user);

    await setDoc(doc(db,'users',user.user.uid),{
      email:email,
      status:'pending',
      createdAt:new Date(),
      lockUntil:null
    });

    popup("تم إنشاء الحساب وإرسال رابط التفعيل إلى بريدك الإلكتروني");

    setTimeout(()=>switchTab('login'),4000);

  }catch(e){popup(e.message)}
}

window.login = async ()=>{
  let email=loginEmail.value;
  let pass=loginPass.value;

  try{
    let user=await signInWithEmailAndPassword(auth,email,pass);

    if(!user.user.emailVerified){
      popup("يجب تفعيل البريد الإلكتروني أولاً");
      return;
    }

    let ref=doc(db,'users',user.user.uid);
    let snap=await getDoc(ref);

    if(!snap.exists()) return popup("الحساب غير موجود");

    let data=snap.data();

    if(data.status!='active') return popup("الحساب غير مفعل أو موقوف");

    if(data.lockUntil && new Date()<data.lockUntil.toDate()){
      return popup("الحساب مقفل مؤقتاً");
    }

    window.location.href="PortalHub.html";

  }catch(e){popup("بيانات غير صحيحة أو الحساب غير متاح")}
}

window.resetPass = async ()=>{
  let email=prompt("ادخل بريدك");
  if(!email) return;
  await sendPasswordResetEmail(auth,email);
  popup("تم إرسال رابط إعادة تعيين كلمة المرور");
}

window.toggleLang=()=>{
  window.location.href="index-en.html";
}

</script>

</body>
</html>
