<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.8.0/firebase-app.js";
import {
  getAuth,
  createUserWithEmailAndPassword,
  signInWithEmailAndPassword,
  sendEmailVerification,
  sendPasswordResetEmail,
  signOut,
  onAuthStateChanged
} from "https://www.gstatic.com/firebasejs/10.8.0/firebase-auth.js";

import {
  getFirestore,
  doc,
  setDoc,
  getDoc,
  updateDoc,
  serverTimestamp,
  deleteDoc
} from "https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore.js";

/* ================= CONFIG ================= */
const firebaseConfig = {
  apiKey: "AIzaSyDA0gnR9U3I90umdJsAJI4h93nEPD3BJ9w",
  authDomain: "alqurmanix-aswan.firebaseapp.com",
  projectId: "alqurmanix-aswan"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

/* ================= SAFE GET ================= */
const $ = (id) => document.getElementById(id);

/* ================= ANTI SPAM ================= */
let busy = false;
function lock() {
  if (busy) return false;
  busy = true;
  setTimeout(()=>busy=false, 2500);
  return true;
}

/* ================= LOG ================= */
async function log(type, uid) {
  try {
    await setDoc(doc(db, "auth_logs", crypto.randomUUID()), {
      uid,
      type,
      timestamp: serverTimestamp()
    });
  } catch {}
}

/* ================= SESSION ================= */
async function createSession(user) {
  await setDoc(doc(db, "sessions", user.uid), {
    createdAt: serverTimestamp(),
    expiresAt: new Date(Date.now() + 86400000)
  });
}

async function deleteSession(user) {
  try {
    await deleteDoc(doc(db, "sessions", user.uid));
  } catch {}
}

/* ================= SIGNUP ================= */
window.handleSignup = async (e) => {
  e.preventDefault();
  if (!lock()) return;

  const email = $("signupEmail").value.trim();
  const pass = $("signupPassword").value;
  const conf = $("signupConfirm").value;

  if (pass !== conf) {
    showModal("خطأ", "كلمة المرور غير متطابقة", "fas fa-times", "#ff4444");
    return;
  }

  if (!/^(?=.*\d)(?=.*[!@#$%^&*]).{8,}$/.test(pass)) {
    showModal("ضعيف", "كلمة المرور ضعيفة", "fas fa-shield", "#ff4444");
    return;
  }

  try {
    const cred = await createUserWithEmailAndPassword(auth, email, pass);
    const user = cred.user;

    await setDoc(doc(db, "users", user.uid), {
      email: user.email,
      status: "pending",
      createdAt: serverTimestamp(),
      lockUntil: null
    });

    await setDoc(doc(db, "security", user.uid), {
      twoFA: false,
      lastPasswordChange: serverTimestamp()
    });

    await sendEmailVerification(user);
    await log("signup", user.uid);

    await signOut(auth);

    showModal("تم", "تم إنشاء الحساب - راجع بريدك للتفعيل", "fas fa-envelope", "#00ff66");

    $("signupForm").reset();
    switchTab("login");

  } catch (err) {
    showModal("خطأ", err.message, "fas fa-times", "#ff4444");
  }
};

/* ================= LOGIN ================= */
window.handleLogin = async (e) => {
  e.preventDefault();
  if (!lock()) return;

  const email = $("loginEmail").value.trim();
  const pass = $("loginPassword").value;

  try {
    const cred = await signInWithEmailAndPassword(auth, email, pass);
    const user = cred.user;

    if (!user.emailVerified) {
      await signOut(auth);
      showModal("تنبيه", "فعل بريدك أولاً", "fas fa-lock", "#ffaa00");
      return;
    }

    const ref = doc(db, "users", user.uid);
    const snap = await getDoc(ref);

    if (!snap.exists()) throw new Error("no_user");

    const data = snap.data();

    const banned = await getDoc(doc(db, "blacklist", user.uid));
    if (banned.exists()) {
      await signOut(auth);
      showModal("محظور", "تم حظر الحساب", "fas fa-ban", "#ff0000");
      return;
    }

    if (data.lockUntil && Date.now() < data.lockUntil.toMillis()) {
      await signOut(auth);
      showModal("مقفل", "الحساب مقفل مؤقتاً", "fas fa-lock", "#ffaa00");
      return;
    }

    if (data.status === "pending") {
      await updateDoc(ref, { status: "active" });
    }

    await createSession(user);
    await log("login", user.uid);

    showModal("نجاح", "جارى الدخول...", "fas fa-crown", "#FFD700");

    setTimeout(()=>location.href="index.html", 2000);

  } catch (err) {
    showModal("فشل", "بيانات غير صحيحة", "fas fa-times", "#ff4444");
  }
};

/* ================= RESET ================= */
window.showResetModal = async () => {
  const email = $("loginEmail").value.trim();

  if (!email) {
    showModal("تنبيه", "اكتب بريدك أولاً", "fas fa-info", "#ffaa00");
    return;
  }

  try {
    await sendPasswordResetEmail(auth, email);

    await setDoc(doc(db, "password_resets", crypto.randomUUID()), {
      uid: "unknown",
      createdAt: serverTimestamp()
    });

    showModal("تم", "تم إرسال رابط إعادة التعيين", "fas fa-paper-plane", "#00ff66");

  } catch {
    showModal("خطأ", "فشل الإرسال", "fas fa-times", "#ff4444");
  }
};

/* ================= RESEND ================= */
window.resendVerification = async () => {
  const email = $("loginEmail").value;
  const pass = $("loginPassword").value;

  if (!email || !pass) {
    showModal("تنبيه", "اكتب البيانات أولاً", "fas fa-info", "#ffaa00");
    return;
  }

  try {
    const cred = await signInWithEmailAndPassword(auth, email, pass);
    const user = cred.user;

    if (!user.emailVerified) {
      await sendEmailVerification(user);
      showModal("تم", "تم إرسال رابط جديد", "fas fa-paper-plane", "#FFD700");
    } else {
      showModal("تم", "الحساب مفعل", "fas fa-check", "#00ff66");
    }

    await signOut(auth);

  } catch {
    showModal("خطأ", "فشل العملية", "fas fa-times", "#ff4444");
  }
};

/* ================= LOGOUT ================= */
window.logout = async () => {
  const user = auth.currentUser;
  if (user) {
    await deleteSession(user);
    await log("logout", user.uid);
  }
  await signOut(auth);
  location.href = "login.html";
};

/* ================= SESSION CHECK ================= */
onAuthStateChanged(auth, async (user) => {
  if (!user) return;

  try {
    const s = await getDoc(doc(db, "sessions", user.uid));
    if (!s.exists()) {
      await signOut(auth);
      location.href = "login.html";
    }
  } catch {}
});

/* ================= ANTI HACK ================= */
let clicks = 0;
window.addEventListener("click", () => {
  clicks++;
  if (clicks > 80) {
    const user = auth.currentUser;
    if (user) {
      setDoc(doc(db, "blacklist", user.uid), { reason: "spam" });
      signOut(auth);
      showModal("تحذير", "تم حظرك تلقائياً", "fas fa-ban", "#ff0000");
    }
  }
});
</script>
