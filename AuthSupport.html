<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>بوابة القرماني - جاري التجهيز</title>
    <style>
        body { background: #0f172a; color: #f8fafc; font-family: sans-serif; display: flex; align-items: center; justify-content: center; height: 100vh; margin: 0; overflow: hidden; }
        .container { text-align: center; border: 2px solid #1e293b; padding: 40px; border-radius: 20px; background: #1e293b; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .logo { font-size: 2.5rem; font-weight: bold; color: #38bdf8; margin-bottom: 20px; letter-spacing: 2px; }
        .status-badge { background: #0369a1; padding: 5px 15px; border-radius: 50px; font-size: 0.8rem; margin-bottom: 20px; display: inline-block; }
        h1 { font-size: 1.5rem; margin-bottom: 10px; }
        p { color: #94a3b8; font-size: 0.9rem; }
        .loader { border: 3px solid #1e293b; border-top: 3px solid #38bdf8; border-radius: 50%; width: 30px; height: 30px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container">
        <div class="logo">ALQURMANIX</div>
        <div class="status-badge">نظام محمي - الإصدار 2.0</div>
        <h1>بوابة الدخول قيد الإنشاء الصارم</h1>
        <p>يتم الآن ربط قواعد البيانات وتفعيل بروتوكولات الأمان النهائية.</p>
        <div class="loader"></div>
        <p style="font-size: 0.7rem;">قواعد "القرماني" البدائية.. لا استثناء، لا تراجع.</p>
    </div>
</body>
</html>
