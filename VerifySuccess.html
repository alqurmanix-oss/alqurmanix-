<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تم التفعيل بنجاح | Alqurmanix</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Cinzel:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.5.1/dist/confetti.browser.min.js"></script>
    <style>
        :root {
            --gold-gradient: linear-gradient(45deg, #BF953F, #FCF6BA, #B38728, #FBF5B7, #AA771C);
            --dark-bg: #050505;
        }

        body {
            margin: 0; padding: 0;
            background-color: var(--dark-bg);
            color: #fff;
            font-family: 'Cairo', sans-serif;
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
            background-image: radial-gradient(circle at center, #111 0%, #000 100%);
        }

        /* حاوية الفخامة المركزية */
        .welcome-card {
            background: rgba(15, 15, 15, 0.8);
            border: 1px solid rgba(191, 149, 63, 0.4);
            border-radius: 30px;
            padding: 50px 30px;
            text-align: center;
            max-width: 500px;
            width: 90%;
            backdrop-filter: blur(20px);
            box-shadow: 0 0 50px rgba(0,0,0,0.8), inset 0 0 30px rgba(191, 149, 63, 0.1);
            position: relative;
            z-index: 10;
            animation: cardEntrance 1.2s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes cardEntrance {
            from { opacity: 0; transform: scale(0.5) translateY(50px); }
            to { opacity: 1; transform: scale(1) translateY(0); }
        }

        /* أيقونة النجاح المشعة */
        .success-icon-wrap {
            width: 100px; height: 100px;
            margin: 0 auto 30px;
            background: var(--gold-gradient);
            border-radius: 50%;
            display: flex; justify-content: center; align-items: center;
            box-shadow: 0 0 30px rgba(191, 149, 63, 0.6);
            animation: pulseGold 2s infinite;
        }

        @keyframes pulseGold {
            0% { transform: scale(1); box-shadow: 0 0 20px rgba(191, 149, 63, 0.6); }
            50% { transform: scale(1.05); box-shadow: 0 0 50px rgba(191, 149, 63, 0.9); }
            100% { transform: scale(1); box-shadow: 0 0 20px rgba(191, 149, 63, 0.6); }
        }

        .success-icon-wrap i {
            font-size: 3.5rem; color: #000;
        }

        /* النصوص الترحيبية */
        h1 {
            font-family: 'Cinzel', serif;
            font-size: 2.2rem;
            background: var(--gold-gradient);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            margin-bottom: 20px;
            letter-spacing: 2px;
        }

        .welcome-msg {
            font-size: 1.3rem;
            color: #eee;
            line-height: 1.8;
            margin-bottom: 30px;
            font-weight: 600;
        }

        .highlight {
            color: var(--gold-2);
            text-shadow: 0 0 10px rgba(252, 246, 186, 0.5);
            display: block;
            margin-top: 10px;
            font-size: 1.5rem;
            font-weight: 900;
        }

        /* شريط التقدم للتحويل التلقائي */
        .redirect-bar-wrap {
            width: 100%;
            height: 4px;
            background: rgba(255,255,255,0.1);
            border-radius: 10px;
            overflow: hidden;
            margin-top: 40px;
        }

        .redirect-bar {
            width: 0%;
            height: 100%;
            background: var(--gold-gradient);
            box-shadow: 0 0 10px var(--gold-2);
            transition: width 6s linear;
        }

        .redirect-text {
            font-size: 0.85rem;
            color: #888;
            margin-top: 10px;
            letter-spacing: 1px;
        }

        /* الجسيمات الخلفية */
        #bg-canvas {
            position: absolute; top: 0; left: 0; width: 100%; height: 100%;
            z-index: 1; pointer-events: none;
        }

    </style>
</head>
<body>

    <canvas id="bg-canvas"></canvas>

    <div class="welcome-card">
        <div class="success-icon-wrap">
            <i class="fas fa-crown"></i>
        </div>
        
        <h1>Alqurmanix X</h1>
        
        <div class="welcome-msg">
            تم تفعيل عضويتك بنجاح باهر!
            <span class="highlight">أهلاً بك في النخبة 💎</span>
            <p style="font-size: 0.95rem; font-weight: 400; color: #bbb; margin-top: 15px;">
                لقد تم التحقق من هويتك الرقمية وتأمين حسابك بأعلى المعايير الصارمة. العالم ينتظرك الآن خلف هذه البوابة.
            </p>
        </div>

        <div class="redirect-bar-wrap">
            <div class="redirect-bar" id="progressBar"></div>
        </div>
        <div class="redirect-text">جاري نقلك إلى لوحة التحكم الرئيسية...</div>
    </div>

    <script>
        // بدء الاحتفالات بمجرد التحميل
        window.onload = () => {
            // إطلاق قصاصات الورق (Confetti)
            const duration = 5 * 1000;
            const animationEnd = Date.now() + duration;
            const defaults = { startVelocity: 30, spread: 360, ticks: 60, zIndex: 0 };

            function randomInRange(min, max) {
                return Math.random() * (max - min) + min;
            }

            const interval = setInterval(function() {
                const timeLeft = animationEnd - Date.now();

                if (timeLeft <= 0) {
                    return clearInterval(interval);
                }

                const particleCount = 50 * (timeLeft / duration);
                confetti(Object.assign({}, defaults, { 
                    particleCount, 
                    origin: { x: randomInRange(0.1, 0.3), y: Math.random() - 0.2 },
                    colors: ['#BF953F', '#FCF6BA', '#B38728']
                }));
                confetti(Object.assign({}, defaults, { 
                    particleCount, 
                    origin: { x: randomInRange(0.7, 0.9), y: Math.random() - 0.2 },
                    colors: ['#BF953F', '#FCF6BA', '#B38728']
                }));
            }, 250);

            // بدء شريط التقدم للتحويل
            setTimeout(() => {
                document.getElementById('progressBar').style.width = '100%';
            }, 100);

            // التحويل التلقائي بعد 6 ثوانٍ (وقت كافٍ للقراءة والاحتفال)
            setTimeout(() => {
                window.location.href = 'PortalHub.html';
            }, 6000);
        };
    </script>
</body>
  </html>
