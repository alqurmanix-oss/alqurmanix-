<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>استعادة الأمان | Alqurmanix</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <style>
        :root { --gold: #d4af37; --dark-bg: #0a0a0a; --card-bg: #111111; }
        body { background-color: var(--dark-bg); color: white; font-family: 'Segoe UI', Tahoma, sans-serif; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        .container { width: 90%; max-width: 400px; background: var(--card-bg); padding: 25px; border-radius: 25px; border: 1px solid rgba(212, 175, 55, 0.3); text-align: center; box-shadow: 0 10px 30px rgba(0,0,0,0.5); }
        .icon-header { color: var(--gold); font-size: 50px; margin-bottom: 10px; }
        h2 { font-size: 22px; margin-bottom: 20px; color: #eee; }
        .input-group { position: relative; margin-bottom: 15px; }
        input { width: 100%; padding: 12px 40px 12px 45px; background: #000; border: 1px solid #333; border-radius: 12px; color: white; box-sizing: border-box; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--gold); }
        .input-group i.main-icon { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); color: var(--gold); }
        .toggle-password { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: #666; cursor: pointer; }
        .requirements { text-align: right; font-size: 12px; margin: 10px; color: #888; }
        .req-item.valid { color: #4CAF50; }
        .btn-submit { width: 100%; padding: 14px; background: linear-gradient(45deg, #d4af37, #f2d06b); border: none; border-radius: 12px; color: #000; font-weight: bold; cursor: pointer; transition: 0.3s; }
        
        /* النافذة المنبثقة */
        #successModal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.9); justify-content: center; align-items: center; z-index: 1000; }
        .modal-content { background: #111; padding: 30px; border-radius: 20px; border: 1px solid var(--gold); text-align: center; width: 80%; max-width: 300px; }
    </style>
</head>
<body>

<div class="container">
    <div class="icon-header"><i class="fas fa-user-shield"></i></div>
    <h2>استعادة الأمان</h2>

    <div class="input-group">
        <i class="fas fa-key main-icon"></i>
        <input type="password" id="newPass" placeholder="كلمة المرور الجديدة">
        <i class="fas fa-eye toggle-password" onclick="togglePass('newPass', this)"></i>
    </div>

    <div class="requirements">
        <div id="len" class="req-item">● 8 أحرف على الأقل</div>
        <div id="num" class="req-item">● رقم واحد على الأقل</div>
    </div>

    <div class="input-group">
        <i class="fas fa-check-double main-icon"></i>
        <input type="password" id="confirmPass" placeholder="تأكيد الكلمة الجديدة">
        <i class="fas fa-eye toggle-password" onclick="togglePass('confirmPass', this)"></i>
    </div>

    <button class="btn-submit" onclick="handleReset()">تحديث وتأمين الحساب</button>
</div>

<div id="successModal">
    <div class="modal-content">
        <i class="fas fa-check-circle" style="color: #4CAF50; font-size: 50px;"></i>
        <h3>تم التحديث بنجاح</h3>
        <p>تم تأمين حسابك. جارٍ توجيهك لصفحة الدخول...</p>
    </div>
</div>

<script>
    // ضع بياناتك هنا فوراً
    const firebaseConfig = {
        apiKey: "AIzaSy...",
        authDomain: "alqurmanix-oss.firebaseapp.com",
        projectId: "alqurmanix-oss",
    };
    firebase.initializeApp(firebaseConfig);

    function togglePass(id, el) {
        const input = document.getElementById(id);
        input.type = input.type === "password" ? "text" : "password";
        el.classList.toggle('fa-eye-slash');
    }

    // التحقق من قوة الكلمة أثناء الكتابة
    document.getElementById('newPass').addEventListener('input', function() {
        document.getElementById('len').classList.toggle('valid', this.value.length >= 8);
        document.getElementById('num').classList.toggle('valid', /[0-9]/.test(this.value));
    });

    async function handleReset() {
        const newPassword = document.getElementById('newPass').value;
        const confirmPassword = document.getElementById('confirmPass').value;
        const urlParams = new URLSearchParams(window.location.search);
        const actionCode = urlParams.get('oobCode');

        if (newPassword !== confirmPassword) return alert("الكلمات غير متطابقة");
        if (!actionCode) return alert("كود التحقق مفقود، يرجى طلب رابط جديد");

        try {
            await firebase.auth().confirmPasswordReset(actionCode, newPassword);
            document.getElementById('successModal').style.display = 'flex';
            setTimeout(() => {
                window.location.href = 'index.html'; // يحولك لصفحة الدخول بعد 5 ثواني
            }, 5000);
        } catch (error) {
            alert("خطأ: " + error.message);
        }
    }
</script>
</body>
</html>
