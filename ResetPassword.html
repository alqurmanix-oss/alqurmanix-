<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تأمين الحساب | Alqurmanix</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <style>
        :root {
            --gold: #d4af37;
            --neon-green: #39ff14;
            --neon-red: #ff3131;
            --neon-yellow: #fefe33;
            --dark-bg: #050505;
            --glass: rgba(255, 255, 255, 0.03);
        }

        body {
            background: radial-gradient(circle at center, #1a1a1a 0%, #050505 100%);
            color: white;
            font-family: 'Segoe UI', Roboto, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden;
        }

        .card {
            width: 90%;
            max-width: 420px;
            background: rgba(15, 15, 15, 0.95);
            padding: 35px 25px;
            border-radius: 30px;
            border: 1px solid var(--gold);
            box-shadow: 0 0 30px rgba(212, 175, 55, 0.15);
            text-align: center;
            position: relative;
        }

        /* اللوجو الفخم */
        .logo-area {
            font-size: 65px;
            color: var(--gold);
            margin-bottom: 10px;
            filter: drop-shadow(0 0 15px var(--gold));
            animation: pulse 2s infinite;
        }

        h2 { font-size: 26px; font-weight: 800; margin-bottom: 30px; letter-spacing: 1px; }

        .input-group { position: relative; margin-bottom: 25px; }
        
        input {
            width: 100%;
            padding: 15px 50px 15px 50px;
            background: #000;
            border: 1px solid #222;
            border-radius: 18px;
            color: white;
            box-sizing: border-box;
            outline: none;
            transition: 0.4s;
            font-size: 16px;
        }

        input:focus { border-color: var(--gold); box-shadow: 0 0 15px rgba(212, 175, 55, 0.2); }

        .input-group i.main-icon { position: absolute; right: 20px; top: 50%; transform: translateY(-50%); color: var(--gold); font-size: 18px; }
        .toggle-password { position: absolute; left: 20px; top: 50%; transform: translateY(-50%); color: #444; cursor: pointer; transition: 0.3s; }
        .toggle-password:hover { color: var(--gold); }

        /* شريط القوة الذكي */
        .strength-container { margin: -15px 5px 20px; text-align: right; }
        .strength-text { font-size: 11px; margin-bottom: 5px; display: block; color: #888; }
        .meter { height: 6px; background: #1a1a1a; border-radius: 10px; overflow: hidden; position: relative; }
        #strength-bar { height: 100%; width: 0%; transition: 0.6s cubic-bezier(0.175, 0.885, 0.32, 1.275); }

        .req-list { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin-bottom: 25px; text-align: right; }
        .req-item { font-size: 12px; color: #444; transition: 0.4s; }
        .req-item.valid { color: var(--neon-green); text-shadow: 0 0 8px var(--neon-green); }

        .btn-action {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, #d4af37 0%, #f2d06b 100%);
            border: none;
            border-radius: 18px;
            color: #000;
            font-weight: 900;
            font-size: 17px;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.3);
            transition: 0.4s;
        }

        .btn-action:hover { transform: translateY(-3px); box-shadow: 0 8px 25px rgba(212, 175, 55, 0.4); }

        /* النافذة المنبثقة الفخمة جداً */
        #successModal {
            display: none;
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.98);
            justify-content: center;
            align-items: center;
            z-index: 10000;
            backdrop-filter: blur(15px);
        }

        .modal-box {
            background: #0a0a0a;
            padding: 50px 30px;
            border-radius: 40px;
            border: 2px solid var(--gold);
            text-align: center;
            box-shadow: 0 0 50px rgba(212, 175, 55, 0.3);
            animation: slideUp 0.6s ease;
        }

        .modal-box i { font-size: 80px; color: var(--neon-green); margin-bottom: 25px; filter: drop-shadow(0 0 15px var(--neon-green)); }
        .modal-box h3 { font-size: 28px; color: #fff; margin-bottom: 15px; }
        .modal-box p { color: #aaa; line-height: 1.6; }
        .tip { margin-top: 20px; font-style: italic; color: var(--gold); font-size: 14px; }

        @keyframes pulse { 0% { opacity: 0.8; } 50% { opacity: 1; transform: scale(1.05); } 100% { opacity: 0.8; } }
        @keyframes slideUp { from { transform: translateY(50px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
    </style>
</head>
<body>

<div class="card">
    <div class="logo-area"><i class="fas fa-crown"></i></div>
    <h2> تحديث الأمان القرمانى</h2>

    <div class="input-group">
        <i class="fas fa-key main-icon"></i>
        <input type="password" id="pass" placeholder="كلمة المرور الجديدة">
        <i class="fas fa-eye toggle-password" onclick="toggle('pass', this)"></i>
    </div>

    <div class="strength-container">
        <span class="strength-text" id="strength-label">حالة الحماية: <span id="status-emoji">🛡️</span></span>
        <div class="meter"><div id="strength-bar"></div></div>
    </div>

    <div class="req-list">
        <div id="q1" class="req-item"><i class="fas fa-circle-check"></i> 8 خانات</div>
        <div id="q2" class="req-item"><i class="fas fa-circle-check"></i> أرقام</div>
        <div id="q3" class="req-item"><i class="fas fa-circle-check"></i> رموز</div>
        <div id="q4" class="req-item"><i class="fas fa-circle-check"></i> أحرف كبيرة</div>
    </div>

    <div class="input-group">
        <i class="fas fa-lock-open main-icon"></i>
        <input type="password" id="confirm" placeholder="تأكيد الكلمة الجديدة">
        <i class="fas fa-eye toggle-password" onclick="toggle('confirm', this)"></i>
    </div>

    <button class="btn-action" onclick="applyReset()">تحديث وتأمين القرمانى</button>
</div>

<!-- مودال النجاح -->
<div id="successModal">
    <div class="modal-box">
        <i class="fas fa-shield-check"></i>
        <h3>تم التغيير بنجاح</h3>
        <p>لقد قمت بتأمين حسابك بأعلى معايير الحماية التابعة لـ <b>Alqurmanix</b>.</p>
        <p class="tip">💡 نصيحة قرمانية: لا تستخدم كلمة السر هذه في مواقع أخرى، الأمان يبدأ بتفردك.</p>
    </div>
</div>

<script>
    // بيانات Firebase (استبدلها ببياناتك)
    const firebaseConfig = { apiKey: "AIzaSy...", authDomain: "alqurmanix-oss.firebaseapp.com", projectId: "alqurmanix-oss" };
    firebase.initializeApp(firebaseConfig);

    function toggle(id, el) {
        const input = document.getElementById(id);
        input.type = input.type === 'password' ? 'text' : 'password';
        el.classList.toggle('fa-eye-slash');
    }

    const passInput = document.getElementById('pass');
    const bar = document.getElementById('strength-bar');

    passInput.addEventListener('input', () => {
        const val = passInput.value;
        let score = 0;
        
        const checks = {
            q1: val.length >= 8,
            q2: /[0-9]/.test(val),
            q3: /[^A-Za-z0-9]/.test(val),
            q4: /[A-Z]/.test(val)
        };

        Object.keys(checks).forEach(id => {
            const el = document.getElementById(id);
            if (checks[id]) { el.classList.add('valid'); score += 25; }
            else { el.classList.remove('valid'); }
        });

        bar.style.width = score + '%';
        const label = document.getElementById('status-emoji');
        
        if(score <= 25) { bar.style.background = '#ff3131'; label.innerHTML = 'ضعيفة ❌'; }
        else if(score <= 50) { bar.style.background = '#fefe33'; label.innerHTML = 'متوسطة ⚠️'; }
        else if(score <= 75) { bar.style.background = '#39ff14'; label.innerHTML = 'قوية ✅'; }
        else { bar.style.background = 'var(--gold)'; label.innerHTML = '💪 قوية  ممتاز'; }
    });

    async function applyReset() {
        const p1 = document.getElementById('pass').value;
        const p2 = document.getElementById('confirm').value;
        const code = new URLSearchParams(window.location.search).get('oobCode');

        if (p1 !== p2) return alert("الكلمات غير متطابقة!");
        if (p1.length < 8) return alert("الكلمة ضعيفة جداً!");

        try {
            await firebase.auth().confirmPasswordReset(code, p1);
            document.getElementById('successModal').style.display = 'flex';
            setTimeout(() => { window.location.href = 'index.html'; }, 5000);
        } catch (e) { alert("عفواً: " + e.message); }
    }
</script>
</body>
</html>
