<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تحديث الأمان | Alqurmanix</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-auth-compat.js"></script>
    <style>
        :root { --gold: #d4af37; --dark-bg: #050505; --card-bg: #0f0f0f; --neon-shadow: 0 0 15px rgba(212, 175, 55, 0.5); }
        
        body { background-color: var(--dark-bg); color: white; font-family: 'Segoe UI', sans-serif; margin: 0; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; }
        
        .container { width: 85%; max-width: 380px; background: var(--card-bg); padding: 30px; border-radius: 30px; border: 1.5px solid var(--gold); text-align: center; box-shadow: var(--neon-shadow); position: relative; }

        .icon-header { color: var(--gold); font-size: 55px; margin-bottom: 15px; filter: drop-shadow(0 0 10px var(--gold)); }
        h2 { font-size: 24px; margin-bottom: 25px; letter-spacing: 1px; }

        .input-group { position: relative; margin-bottom: 20px; }
        input { width: 100%; padding: 14px 45px 14px 45px; background: #000; border: 1px solid #222; border-radius: 15px; color: white; box-sizing: border-box; outline: none; transition: 0.4s; font-size: 15px; }
        input:focus { border-color: var(--gold); box-shadow: 0 0 8px rgba(212, 175, 55, 0.3); }

        .input-group i.main-icon { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); color: var(--gold); }
        .toggle-password { position: absolute; left: 15px; top: 50%; transform: translateY(-50%); color: #555; cursor: pointer; transition: 0.3s; }
        .toggle-password:hover { color: var(--gold); }

        /* شريط قوة كلمة المرور النيون */
        .strength-meter { height: 4px; width: 100%; background: #222; margin-top: -15px; margin-bottom: 15px; border-radius: 10px; overflow: hidden; }
        #strength-bar { height: 100%; width: 0%; transition: 0.5s ease; box-shadow: 0 0 10px currentColor; }

        .requirements { text-align: right; font-size: 12px; margin-bottom: 20px; color: #666; display: grid; grid-template-columns: 1fr 1fr; gap: 5px; }
        .req-item.valid { color: var(--gold); text-shadow: 0 0 5px var(--gold); }

        .btn-submit { width: 100%; padding: 15px; background: linear-gradient(135deg, #d4af37 0%, #f2d06b 100%); border: none; border-radius: 15px; color: #000; font-weight: 900; font-size: 16px; cursor: pointer; transition: 0.4s; text-transform: uppercase; }
        .btn-submit:hover { transform: scale(1.02); box-shadow: 0 0 20px rgba(212, 175, 55, 0.6); }

        /* النافذة المنبثقة */
        #successModal { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.95); justify-content: center; align-items: center; z-index: 9999; backdrop-filter: blur(10px); }
        .modal-content { background: #111; padding: 40px; border-radius: 25px; border: 2px solid var(--gold); text-align: center; box-shadow: var(--neon-shadow); }
        .modal-content i { font-size: 60px; color: #4CAF50; margin-bottom: 20px; }
    </style>
</head>
<body>

<div class="container">
    <div class="icon-header"><i class="fas fa-shield-halved"></i></div>
    <h2>تحديــد الأمــان</h2>

    <div class="input-group">
        <i class="fas fa-lock main-icon"></i>
        <input type="password" id="newPass" placeholder="الرقم السري الجديد">
        <i class="fas fa-eye toggle-password" onclick="togglePass('newPass', this)"></i>
    </div>

    <div class="strength-meter">
        <div id="strength-bar"></div>
    </div>

    <div class="requirements">
        <div id="len" class="req-item"><i class="fas fa-circle-check"></i> 8 أحرف</div>
        <div id="num" class="req-item"><i class="fas fa-circle-check"></i> أرقام</div>
    </div>

    <div class="input-group">
        <i class="fas fa-shield-check main-icon"></i>
        <input type="password" id="confirmPass" placeholder="تأكيد الرقم السري">
        <i class="fas fa-eye toggle-password" onclick="togglePass('confirmPass', this)"></i>
    </div>

    <button class="btn-submit" onclick="handleReset()">تحديث وتأمين الملكية</button>
</div>

<div id="successModal">
    <div class="modal-content">
        <i class="fas fa-crown"></i>
        <h3>تم التحديث بنجاح</h3>
        <p>تم تأمين حسابك بفعالية. جارٍ التحويل...</p>
    </div>
</div>

<script>
    // بيانات Firebase الخاصة بك (تأكد من دقتها)
    const firebaseConfig = {
        apiKey: "AIzaSy...", 
        authDomain: "alqurmanix-oss.firebaseapp.com",
        projectId: "alqurmanix-oss",
    };
    firebase.initializeApp(firebaseConfig);

    function togglePass(id, el) {
        const input = document.getElementById(id);
        input.type = input.type === "password" ? "text" : "password";
        el.classList.toggle('fa-eye-slash');
    }

    const newPass = document.getElementById('newPass');
    const bar = document.getElementById('strength-bar');

    newPass.addEventListener('input', () => {
        let strength = 0;
        const val = newPass.value;
        
        if (val.length >= 8) { strength += 50; document.getElementById('len').classList.add('valid'); } else { document.getElementById('len').classList.remove('valid'); }
        if (/[0-9]/.test(val)) { strength += 50; document.getElementById('num').classList.add('valid'); } else { document.getElementById('num').classList.remove('valid'); }

        bar.style.width = strength + '%';
        if (strength < 50) bar.style.color = '#ff4d4d';
        else if (strength < 100) bar.style.color = '#ffd700';
        else bar.style.color = '#d4af37';
        bar.style.backgroundColor = 'currentColor';
    });

    async function handleReset() {
        const newPassword = document.getElementById('newPass').value;
        const confirmPassword = document.getElementById('confirmPass').value;
        const actionCode = new URLSearchParams(window.location.search).get('oobCode');

        if (newPassword !== confirmPassword) return alert("الكلمات غير متطابقة يا بطل!");
        if (!actionCode) return alert("الرابط منتهي الصلاحية، اطلب رابطاً جديداً.");

        try {
            await firebase.auth().confirmPasswordReset(actionCode, newPassword);
            document.getElementById('successModal').style.display = 'flex';
            setTimeout(() => { window.location.href = 'index.html'; }, 4000);
        } catch (error) {
            alert("خطأ: " + error.message);
        }
    }
</script>
</body>
</html>
