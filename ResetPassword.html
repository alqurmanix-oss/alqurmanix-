<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>تحديث الأمان | Alqurmanix</title>
    <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@400;700;900&family=Cinzel:wght@700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --gold-main: #BF953F;
            --gold-bright: #FCF6BA;
            --neon-green: #00ff66;
            --dark-deep: #050505;
        }

        body {
            margin: 0; padding: 0;
            background-color: var(--dark-deep);
            background-image: radial-gradient(circle at center, #111 0%, #000 100%);
            color: #fff; font-family: 'Cairo', sans-serif;
            height: 100vh; display: flex; justify-content: center; align-items: center;
            overflow: hidden;
        }

        .reset-card {
            background: rgba(15, 15, 15, 0.9);
            border: 1px solid rgba(191, 149, 63, 0.4);
            border-radius: 25px;
            padding: 40px;
            width: 90%; max-width: 450px;
            backdrop-filter: blur(15px);
            box-shadow: 0 20px 50px rgba(0,0,0,0.9), inset 0 0 20px rgba(191, 149, 63, 0.05);
            text-align: center;
            animation: slideUp 1s ease-out;
        }

        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }

        .shield-icon {
            font-size: 3.5rem; color: var(--gold-main);
            margin-bottom: 20px;
            filter: drop-shadow(0 0 15px rgba(191, 149, 63, 0.5));
        }

        h2 {
            font-family: 'Cinzel', serif; font-size: 1.8rem;
            background: linear-gradient(45deg, var(--gold-main), var(--gold-bright));
            -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            margin-bottom: 30px;
        }

        .input-box { position: relative; margin-bottom: 25px; }
        .input-box input {
            width: 100%; padding: 15px 45px 15px 15px;
            background: rgba(0,0,0,0.6); border: 1px solid rgba(191, 149, 63, 0.2);
            border-radius: 12px; color: #fff; font-size: 1rem; outline: none;
            transition: 0.3s; box-sizing: border-box;
        }
        .input-box input:focus { border-color: var(--gold-main); box-shadow: 0 0 15px rgba(191, 149, 63, 0.2); }
        .input-box i { position: absolute; right: 15px; top: 50%; transform: translateY(-50%); color: var(--gold-main); }

        /* شريط القوة */
        .strength-meter {
            height: 4px; width: 100%; background: rgba(255,255,255,0.1);
            border-radius: 10px; margin-top: -15px; margin-bottom: 20px; overflow: hidden;
        }
        .strength-bar { height: 100%; width: 0%; transition: 0.5s cubic-bezier(0.4, 0, 0.2, 1); }

        /* شروط الكلمة */
        .req-list { text-align: right; margin-bottom: 30px; }
        .req-item { font-size: 0.85rem; color: #777; margin-bottom: 8px; transition: 0.3s; display: flex; align-items: center; gap: 8px; }
        .req-item.active { color: var(--neon-green); text-shadow: 0 0 10px var(--neon-green); }
        .req-item i { font-size: 0.7rem; }

        .btn-update {
            width: 100%; padding: 15px;
            background: linear-gradient(45deg, #AA771C, var(--gold-bright));
            border: none; border-radius: 12px; color: #000;
            font-weight: 900; font-size: 1.1rem; cursor: pointer;
            transition: 0.3s;
        }
        .btn-update:hover { transform: scale(1.03); box-shadow: 0 0 25px var(--gold-main); }

        /* النافذة المنبثقة الفخمة */
        .modal-overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.9); backdrop-filter: blur(10px);
            display: none; justify-content: center; align-items: center; z-index: 1000;
        }
        .modal-content {
            background: #0a0a0a; border: 1px solid var(--gold-main);
            padding: 40px; border-radius: 20px; text-align: center;
            max-width: 400px; width: 85%; box-shadow: 0 0 50px rgba(191, 149, 63, 0.4);
            animation: popIn 0.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }
        @keyframes popIn { from { transform: scale(0.7); opacity: 0; } to { transform: scale(1); opacity: 1; } }
        
        .modal-icon { font-size: 4rem; color: var(--neon-green); margin-bottom: 20px; animation: bounce 1s infinite alternate; }
        @keyframes bounce { from { transform: translateY(0); } to { transform: translateY(-10px); } }

    </style>
</head>
<body>

    <div class="reset-card">
        <i class="fas fa-user-shield shield-icon"></i>
        <h2>استعادة الأمان</h2>
        
        <form id="resetForm">
            <div class="input-box">
                <i class="fas fa-key"></i>
                <input type="password" id="newPass" placeholder="كلمة المرور الجديدة" required oninput="validatePass()">
            </div>

            <div class="strength-meter">
                <div id="strengthBar" class="strength-bar"></div>
            </div>

            <div class="req-list">
                <div id="req-8" class="req-item"><i class="fas fa-circle"></i> 8 أحرف على الأقل</div>
                <div id="req-num" class="req-item"><i class="fas fa-circle"></i> رقم واحد على الأقل</div>
                <div id="req-spec" class="req-item"><i class="fas fa-circle"></i> رمز خاص (#$@!)</div>
            </div>

            <div class="input-box">
                <i class="fas fa-check-double"></i>
                <input type="password" id="confirmPass" placeholder="تأكيد الكلمة الجديدة" required>
            </div>

            <button type="submit" class="btn-update">تحديث وتأمين الحساب</button>
        </form>
    </div>

    <!-- النافذة المنبثقة الفخمة -->
    <div class="modal-overlay" id="successModal">
        <div class="modal-content">
            <i class="fas fa-check-circle modal-icon"></i>
            <h3 style="color: var(--gold-bright); font-size: 1.5rem; margin-bottom: 15px;">تم التحديث بنجاح باهر!</h3>
            <p style="color: #ccc; line-height: 1.7; margin-bottom: 25px;">
                تم تأمين حسابك بكلمة مرور جديدة قوية. <br>
                <strong style="color: var(--gold-main);">نصيحة ملكية:</strong> لا تشارك هذه البيانات مع أحد أبداً، واحرص على تحديثها دورياً لضمان أعلى مستويات الخصوصية.
            </p>
            <div style="font-size: 0.8rem; color: #666;">جاري تحويلك لصفحة الدخول خلال ثوانٍ...</div>
        </div>
    </div>

    <script>
        function validatePass() {
            const pass = document.getElementById('newPass').value;
            const bar = document.getElementById('strengthBar');
            let score = 0;

            const checks = {
                'req-8': pass.length >= 8,
                'req-num': /[0-9]/.test(pass),
                'req-spec': /[!@#$%^&*]/.test(pass)
            };

            for (let id in checks) {
                const el = document.getElementById(id);
                if (checks[id]) {
                    el.classList.add('active');
                    el.querySelector('i').className = 'fas fa-check-circle';
                    score += 33.3;
                } else {
                    el.classList.remove('active');
                    el.querySelector('i').className = 'fas fa-circle';
                }
            }

            bar.style.width = score + '%';
            if(score < 40) bar.style.backgroundColor = '#ff4444';
            else if(score < 80) bar.style.backgroundColor = '#ffbb33';
            else bar.style.backgroundColor = 'var(--neon-green)';
        }

        document.getElementById('resetForm').onsubmit = function(e) {
            e.preventDefault();
            const p1 = document.getElementById('newPass').value;
            const p2 = document.getElementById('confirmPass').value;

            if(p1 !== p2) {
                alert("كلمات المرور غير متطابقة!");
                return;
            }

            // هنا تضع كود Firebase الفعلي لتحديث الكلمة
            // بعد النجاح:
            document.getElementById('successModal').style.display = 'flex';
            
            setTimeout(() => {
                // استبدل الرابط برابط صفحة تسجيل الدخول الخاصة بك
                window.location.href = 'https://alqurmanix-oss.github.io/alqurmanix-/auth.html';
            }, 7000); // 7 ثوانٍ للقراءة بتركيز وفخامة
        };
    </script>
</body>
</html>
