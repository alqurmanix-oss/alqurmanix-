<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>استعادة الأمان | Alqurmanix</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root {
            --gold: #d4af37;
            --dark-bg: #0a0a0a;
            --card-bg: #111111;
        }

        body {
            background-color: var(--dark-bg);
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            overflow: hidden; /* لمنع التمرير الزائد على الموبايل */
        }

        .container {
            width: 90%;
            max-width: 400px;
            background: var(--card-bg);
            padding: 20px;
            border-radius: 25px;
            border: 1px solid rgba(212, 175, 55, 0.3);
            text-align: center;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
        }

        .icon-header {
            color: var(--gold);
            font-size: 60px;
            margin-bottom: 10px;
        }

        h2 {
            font-size: 24px;
            margin-bottom: 20px;
            color: #eee;
        }

        .input-group {
            position: relative;
            margin-bottom: 15px;
        }

        input {
            width: 100%;
            padding: 12px 40px 12px 45px;
            background: #000;
            border: 1px solid #333;
            border-radius: 12px;
            color: white;
            box-sizing: border-box;
            outline: none;
            transition: 0.3s;
        }

        input:focus {
            border-color: var(--gold);
            box-shadow: 0 0 10px rgba(212, 175, 55, 0.2);
        }

        .input-group i.main-icon {
            position: absolute;
            right: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--gold);
        }

        .toggle-password {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: #666;
            cursor: pointer;
            transition: 0.3s;
        }

        .toggle-password:hover { color: var(--gold); }

        .requirements {
            text-align: right;
            font-size: 13px;
            margin: 15px 10px;
            color: #888;
        }

        .req-item { margin-bottom: 5px; transition: 0.3s; }
        .req-item.valid { color: #4CAF50; }
        .req-item.valid i { color: #4CAF50; }

        .btn-submit {
            width: 100%;
            padding: 14px;
            background: linear-gradient(45deg, #d4af37, #f2d06b);
            border: none;
            border-radius: 12px;
            color: #000;
            font-weight: bold;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
            margin-top: 10px;
        }

        .btn-submit:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(212, 175, 55, 0.4);
        }
    </style>
</head>
<body>

<div class="container">
    <div class="icon-header">
        <i class="fas fa-user-shield"></i>
    </div>
    <h2>استعادة الأمان</h2>

    <div class="input-group">
        <i class="fas fa-key main-icon"></i>
        <input type="password" id="newPass" placeholder="كلمة المرور الجديدة">
        <i class="fas fa-eye toggle-password" onclick="togglePass('newPass', this)"></i>
    </div>

    <div class="requirements">
        <div class="req-item" id="len"><i class="fas fa-circle-notch"></i> 8 أحرف على الأقل</div>
        <div class="req-item" id="num"><i class="fas fa-circle-notch"></i> رقم واحد على الأقل</div>
        <div class="req-item" id="spec"><i class="fas fa-circle-notch"></i> رمز خاص (!@#$%)</div>
    </div>

    <div class="input-group">
        <i class="fas fa-check-double main-icon"></i>
        <input type="password" id="confirmPass" placeholder="تأكيد الكلمة الجديدة">
        <i class="fas fa-eye toggle-password" onclick="togglePass('confirmPass', this)"></i>
    </div>

    <button class="btn-submit">تحديث وتأمين الحساب</button>
</div>

<script>
    function togglePass(id, el) {
        const input = document.getElementById(id);
        if (input.type === "password") {
            input.type = "text";
            el.classList.replace('fa-eye', 'fa-eye-slash');
        } else {
            input.type = "password";
            el.classList.replace('fa-eye-slash', 'fa-eye');
        }
    }

    const newPass = document.getElementById('newPass');
    newPass.addEventListener('input', function() {
        const val = this.value;
        // التحقق من الشروط لتغيير الألوان
        document.getElementById('len').className = val.length >= 8 ? 'req-item valid' : 'req-item';
        document.getElementById('num').className = /[0-9]/.test(val) ? 'req-item valid' : 'req-item';
        document.getElementById('spec').className = /[!@#$%^&*]/.test(val) ? 'req-item valid' : 'req-item';
    });
</script>

</body>
</html>
